name: CI/CD Pipeline - RS Medicare (DevSecOps)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ─────────────────────────────────────────────────
  # SECURITY 1: Secret Scanning with Gitleaks
  # Mencegah API key / password tidak sengaja di-push
  # ─────────────────────────────────────────────────
  secret-scanning:
    name: 🔐 Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks - Detect hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────
  # SECURITY 2: Dependency & Filesystem Vulnerability Scan
  # Penting untuk web app medis agar bebas celah keamanan
  # ──────────────────────────────────────────────────────
  dependency-scan:
    name: 🔍 Dependency Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: secret-scanning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy - Scan filesystem for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Upload scan results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-fs-results
          path: trivy-fs-results.sarif
          retention-days: 7

  # ──────────────────────────────────────────────────────
  # VALIDATE: Cek struktur file HTML agar tidak broken
  # ──────────────────────────────────────────────────────
  validate-html:
    name: 🌐 Validate HTML Structure
    runs-on: ubuntu-latest
    needs: secret-scanning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking required project files..."
          test -f index.html  && echo "✅ index.html found"    || (echo "❌ index.html missing!" && exit 1)
          test -f Dockerfile  && echo "✅ Dockerfile found"    || (echo "❌ Dockerfile missing!" && exit 1)
          test -f README.md   && echo "✅ README.md found"     || (echo "❌ README.md missing!" && exit 1)
          echo "All required files present."

      - name: Validate HTML syntax
        run: |
          sudo apt-get install -y tidy -q
          tidy -errors -quiet -utf8 index.html || true
          echo "✅ HTML validation completed."

  # ──────────────────────────────────────────────────────
  # BUILD: Build Docker Image RS Medicare
  # ──────────────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: [dependency-scan, validate-html]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          echo "Building RS Medicare Docker image..."
          docker build -t rs-medicare:${{ github.sha }} .
          docker tag rs-medicare:${{ github.sha }} rs-medicare:latest
          echo "✅ Docker image built successfully."

      - name: Save Docker image as artifact
        run: docker save rs-medicare:latest | gzip > rs-medicare-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: rs-medicare-image.tar.gz
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # SECURITY 3: Docker Image Security Scan
  # Scan image Docker untuk vulnerabilities sebelum dijalankan
  # ──────────────────────────────────────────────────────────────
  docker-image-scan:
    name: 🛡️ Docker Image Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < rs-medicare-image.tar.gz

      - name: Run Trivy - Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'rs-medicare:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Upload image scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-results
          path: trivy-image-results.sarif
          retention-days: 7

  # ──────────────────────────────────────────────────────
  # SUMMARY: Ringkasan hasil pipeline
  # ──────────────────────────────────────────────────────
  pipeline-summary:
    name: ✅ Pipeline Summary
    runs-on: ubuntu-latest
    needs: [secret-scanning, dependency-scan, validate-html, build, docker-image-scan]
    if: always()
    steps:
      - name: Print pipeline summary
        run: |
          echo "================================================="
          echo "   CI/CD Pipeline - RS Medicare Web App"
          echo "   GSLC Sesi 4 DevSecOps — Kelompok 1"
          echo "================================================="
          echo ""
          echo "  👥 Tim:"
          echo "     - LuisArmando           (Ketua Kelompok)"
          echo "     - Timotius Rievaldo Paskah (Collaborator)"
          echo "     - Arnesto Agung Detanomez  (Collaborator)"
          echo ""
          echo "  🏥 Project  : RS Medicare Web App"
          echo "  🌿 Branch   : ${{ github.ref_name }}"
          echo "  🔖 Commit   : ${{ github.sha }}"
          echo "  👤 Trigger  : ${{ github.actor }}"
          echo ""
          echo "  🔒 Security Checks:"
          echo "     [1] Secret Scanning      : Gitleaks"
          echo "     [2] Dependency Scan      : Trivy (filesystem)"
          echo "     [3] Docker Image Scan    : Trivy (image)"
          echo ""
          echo "  ✅ Validate:"
          echo "     - HTML structure check"
          echo "     - Required files verification"
          echo "================================================="
